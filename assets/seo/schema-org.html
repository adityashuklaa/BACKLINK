      "acceptedAnswer": {
        "@type": "Answer",
        "text": "DialPhone runs four plans on annual billing: Core at $20 per user per month, Advanced at $30 per user per month, Ultra at $40 per user per month, and Customer Engagement at $55 per user per month. A 14-day free trial is available on every plan with no credit card required."

    },
    {
      "@type": "Question",
      "name": "Does DialPhone offer a free trial?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Every DialPhone plan includes a 14-day free trial with no credit card required at signup. The trial includes full access to the platform's features on whichever tier is selected."
      }
    },
    {
      "@type": "Question",
      "name": "What is DialPhone's uptime SLA?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "DialPhone commits to 99.999% uptime in its service-level agreement. This translates to a maximum of approximately 5 minutes of unplanned downtime per year."
      }
    },

      "@type": "Question",
      "name": "Is DialPhone HIPAA compliant?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "DialPhone maintains compliance alignment with SOC 2, HIPAA, GDPR, and PCI-DSS standards. Business Associate Agreements (BAAs) are available for customers operating under HIPAA. All traffic is encrypted in transit with TLS 1.2 or higher, and data at rest uses AES-256 encryption."
      }
    },
    {
      "@type": "Question",
      "name": "Which CRMs integrate with DialPhone?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "DialPhone includes native CRM integrations with Salesforce, HubSpot, Pipedrive, and Zoho. Zapier is also supported for connecting to additional applications. CRM integrations are available starting on the Ultra tier ($40 per user per month)."
      }
    },
    {
      "@type": "Question",
      "name": "How long does number porting take with DialPhone?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Number porting with DialPhone is free and typically completes in 2 to 5 business days. The porting process is managed through a white-glove service that migrates your existing phone numbers with zero service interruption."
      }
    },
    {
      "@type": "Question",
      "name": "Does DialPhone serve customers outside the United States and Canada?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "DialPhone is primarily built for small and mid-sized businesses across the United States and Canada. North American subsidiaries of international companies can also use DialPhone to obtain local US and Canadian phone numbers with local business-hours support."

    }
